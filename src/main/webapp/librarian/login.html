<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для библиотекаря - Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            <i class="bi bi-shield-lock"></i> Библиотекарь
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="../index.html">
                        <i class="bi bi-house"></i> Главная
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Форма входа -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock display-1 text-success"></i>
                        <h3 class="mt-3">Вход для библиотекаря</h3>
                        <p class="text-muted">Введите пароль для доступа к панели управления</p>
                    </div>
                    
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-key"></i>
                                </span>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       placeholder="Введите пароль"
                                       required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-box-arrow-in-right"></i> Войти
                            </button>
                        </div>
                    </form>
                    
                    <div id="errorMessage" class="alert alert-danger mt-3 d-none">
                        <i class="bi bi-exclamation-triangle"></i> Неверный пароль!
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <small class="text-muted">
                            Пароль по умолчанию: <strong>admin123</strong>
                        </small>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="../index.html" class="text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Вернуться на главную
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="bg-light text-center text-muted py-4 mt-5">
    <p>&copy; 2024 Библиотечная система</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Пароль для библиотекаря (в реальном приложении используйте серверную аутентификацию)
    const LIBRARIAN_PASSWORD = 'admin123';
    
    // Проверка сохранения сессии при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        if (sessionStorage.getItem('librarianLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    });
    
    // Обработка формы входа
    function handleLogin(event) {
        event.preventDefault();
        
        const password = document.getElementById('password').value;
        const errorMessage = document.getElementById('errorMessage');
        
        if (password === LIBRARIAN_PASSWORD) {
            // Успешный вход - сохраняем сессию
            sessionStorage.setItem('librarianLoggedIn', 'true');
            
            // Показываем сообщение об успехе
            errorMessage.classList.remove('alert-danger', 'd-none');
            errorMessage.classList.add('alert-success');
            errorMessage.innerHTML = '<i class="bi bi-check-circle"></i> Вход выполнен успешно! Перенаправление...';
            
            // Перенаправляем на панель управления через 1 секунду
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1000);
        } else {
            // Ошибка входа
            errorMessage.classList.remove('alert-success', 'd-none');
            errorMessage.classList.add('alert-danger');
            errorMessage.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Неверный пароль!';
            errorMessage.classList.remove('d-none');
            
            // Очищаем поле пароля
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    }
    
    // Показать/скрыть пароль
    function togglePassword() {
        const passwordField = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordField.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    }
</script>
</body>
</html>
