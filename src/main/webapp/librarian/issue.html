<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выдача книг - Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            <i class="bi bi-shield-lock"></i> Библиотекарь
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Панель</a>
            <a class="nav-link active" href="issue.html"><i class="bi bi-hand-index"></i> Выдача</a>
            <a class="nav-link" href="returns.html"><i class="bi bi-arrow-return-left"></i> Возвраты</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-hand-index"></i> Выдача книги</h2>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Выдать по ID заказа</h5>
                    <div class="mb-3">
                        <label class="form-label">ID заказа</label>
                        <input type="number" id="orderId" class="form-control" placeholder="Введите ID заказа">
                    </div>
                    <button class="btn btn-success" onclick="issueBook()">
                        <i class="bi bi-check-lg"></i> Выдать книгу
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="orderInfo"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
    // Проверка аутентификации при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        if (sessionStorage.getItem('librarianLoggedIn') !== 'true') {
            window.location.href = 'login.html';
            return;
        }
    });

    function issueBook() {
        const orderId = document.getElementById('orderId').value;
        if (!orderId) {
            alert('Введите ID заказа');
            return;
        }

        fetch(`/library/rest/api/orders/${orderId}/issue`, { method: 'POST' })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .then(loan => {
                alert(`Книга успешно выдана!\nID выдачи: ${loan.id}\nСрок возврата: ${loan.dueDate}`);
                document.getElementById('orderId').value = '';
                document.getElementById('orderInfo').innerHTML = '';
            })
            .catch(error => {
                alert('Ошибка: ' + error.message);
            });
    }
</script>
</body>
</html>
