<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Возврат книг - Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            <i class="bi bi-shield-lock"></i> Библиотекарь
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Панель</a>
            <a class="nav-link" href="issue.html"><i class="bi bi-hand-index"></i> Выдача</a>
            <a class="nav-link active" href="returns.html"><i class="bi bi-arrow-return-left"></i> Возвраты</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-arrow-return-left"></i> Возврат книги</h2>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Принять возврат</h5>
                    <div class="mb-3">
                        <label class="form-label">ID выдачи</label>
                        <input type="number" id="loanId" class="form-control" placeholder="Введите ID выдачи">
                    </div>
                    <button class="btn btn-primary" onclick="returnBook()">
                        <i class="bi bi-check-lg"></i> Принять возврат
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
    function returnBook() {
        const loanId = document.getElementById('loanId').value;
        if (!loanId) {
            alert('Введите ID выдачи');
            return;
        }

        if (!confirm('Подтвердить возврат книги?')) return;

        fetch(`/library/rest/api/loans/${loanId}/return`, { method: 'POST' })
            .then(response => {
                if (response.ok) {
                    alert('Книга успешно возвращена!');
                    document.getElementById('loanId').value = '';
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .catch(error => {
                alert('Ошибка: ' + error.message);
            });
    }
</script>
</body>
</html>
