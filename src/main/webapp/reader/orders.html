<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заказы - Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            <i class="bi bi-book-half"></i> Библиотека
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="search.html"><i class="bi bi-search"></i> Поиск</a>
            <a class="nav-link active" href="orders.html"><i class="bi bi-list-task"></i> Мои заказы</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-list-task"></i> Мои заказы</h2>

    <div class="row mb-3">
        <div class="col-md-4">
            <input type="number" id="readerIdInput" class="form-control"
                   placeholder="Введите ваш ID читателя">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary" onclick="loadOrders()">
                <i class="bi bi-arrow-clockwise"></i> Обновить
            </button>
        </div>
    </div>

    <div id="ordersList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
    function loadOrders() {
        const readerId = document.getElementById('readerIdInput').value;
        if (!readerId) {
            alert('Введите ID читателя');
            return;
        }

        fetch(`/library/rest/api/readers/${readerId}/orders`)
            .then(response => response.json())
            .then(orders => {
                const container = document.getElementById('ordersList');
                if (orders.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">У вас нет заказов</div>';
                    return;
                }

                container.innerHTML = `
                        <table class="table table-striped table-hover">
                            <thead class="table-primary">
                                <tr>
                                    <th>ID заказа</th>
                                    <th>Книга</th>
                                    <th>Тип</th>
                                    <th>Статус</th>
                                    <th>Дата создания</th>
                                    <th>Срок возврата</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${orders.map(order => `
                                    <tr>
                                        <td>${order.id}</td>
                                        <td>${order.book ? order.book.title : 'N/A'}</td>
                                        <td>${order.loanType === 'HOME' ? 'Абонемент' : 'Читальный зал'}</td>
                                        <td><span class="badge bg-${getStatusColor(order.status)}">${order.status}</span></td>
                                        <td>${order.createdDate || 'N/A'}</td>
                                        <td>${order.loan ? (order.loan.dueDate || 'N/A') : 'Не выдано'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('ordersList').innerHTML =
                    '<div class="alert alert-danger">Ошибка при загрузке заказов</div>';
            });
    }

    function getStatusColor(status) {
        const colors = {
            'PENDING': 'warning',
            'ISSUED': 'success',
            'RETURNED': 'secondary',
            'CANCELLED': 'danger'
        };
        return colors[status] || 'primary';
    }
</script>
</body>
</html>
